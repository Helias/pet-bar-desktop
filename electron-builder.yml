appId: io.github.helias.pet-bar-desktop
productName: Pet Bar
executableName: pet-bar
directories:
  output: release
files:
  - dist/main/**
  - ui/dist/ui/browser/**
  - package.json
extraResources:
  # Clips are shipped in release artifacts only (never in git), matching
  # upstream's distribution policy.
  - from: themes
    to: themes
linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: build/icon.png
mac:
  target: dmg
  icon: build/icon.icns
  extendInfo:
    LSUIElement: true
win:
  target: nsis
  icon: build/icon.ico
