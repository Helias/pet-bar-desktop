<div class="flex h-screen flex-col gap-2 bg-neutral-100 p-4 text-neutral-900 dark:bg-neutral-900 dark:text-neutral-100">
  <label class="text-sm font-medium" for="ask-input">{{ promptLabel() }}</label>
  <textarea
    id="ask-input"
    class="h-20 w-full resize-none rounded border border-neutral-300 bg-white p-2 text-sm focus:border-amber-600 focus:outline-none dark:border-neutral-600 dark:bg-neutral-800"
    [ngModel]="text()"
    (ngModelChange)="onInput($event)"
    (keydown)="onKeydown($event)"
    [attr.maxlength]="maxChars()"
    autofocus
  ></textarea>
  <div class="text-xs text-neutral-500 dark:text-neutral-400">{{ text().length }} / {{ maxChars() }}</div>
  <div class="mt-auto flex justify-end gap-2">
    <button
      class="rounded border border-neutral-300 bg-white px-4 py-1.5 text-sm hover:bg-neutral-200 dark:border-neutral-600 dark:bg-neutral-700 dark:hover:bg-neutral-600"
      (click)="cancel()"
    >
      {{ 'ask.cancel' | transloco }}
    </button>
    <button
      class="rounded bg-amber-700 px-4 py-1.5 text-sm text-white hover:bg-amber-800 disabled:opacity-40"
      [disabled]="!canSubmit()"
      (click)="submit()"
    >
      {{ 'ask.submit' | transloco }}
    </button>
  </div>
</div>
